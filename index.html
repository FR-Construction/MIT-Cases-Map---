<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Rico Cases Dashboard</title>
    <link rel="stylesheet" href="style.css?v=2">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <header>
            <div class="header-content">
                <h1>MIT Cases Dashboard</h1>
                <div class="legend">
                    <div class="legend-item"><span class="marker relo"></span> Relocation</div>
                    <div class="legend-item"><span class="marker recon"></span> Reconstruction</div>
                </div>
            </div>
        </header>
        <main>
            <div id="map"></div>
            <div id="summary-report" class="hidden">
                <h3>Resumen Regional</h3>
                <div class="summary-content">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>
        <div id="loading-overlay" class="active">
            <div class="spinner"></div>
            <p>Loading Map Data...</p>
        </div>
    </div>

    <!-- Google Maps JS API (loaded async via app.js to control initialization if needed, but synchronous callback works too) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC7mft-eK0A5xk6JpV7w-7EGLEoINuLaqM&callback=initMap&libraries=maps,marker&v=beta" async defer></script>
    <script src="app.js?v=2"></script>
</body>
</html>
