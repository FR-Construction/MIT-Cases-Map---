<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto Rico Cases Dashboard</title>
    <link rel="stylesheet" href="style.css?v=12">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Choices.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
</head>
<body>
    <div id="app-container">
        <header>
            <div class="header-content">
                <h1>MIT Cases Dashboard</h1>
                <div class="header-actions">
                    <button id="btn-schedule-tool" class="btn" style="background-color: #805ad5;">Schedule Tool</button>
                    <button id="btn-popout-map" class="btn">Pop-out Map</button>
                    <button id="btn-popout-table" class="btn">Pop-out Report</button>
                </div>
                <div class="legend">
                    <div class="legend-item"><span class="marker relo"></span> Relocation</div>
                    <div class="legend-item"><span class="marker recon"></span> Reconstruction</div>
                </div>
            </div>
        </header>
        <main>
            <div id="schedule-section" class="hidden">
                <h2 class="schedule-title">Substantial Phase Schedule</h2>
                <div class="schedule-toolbar">
                    <div class="filter-group">
                        <label for="schedule-case-id">Case ID</label>
                        <input type="text" id="schedule-case-id" list="schedule-case-list" placeholder="Ex. PR-BR-50495">
                        <datalist id="schedule-case-list"></datalist>
                    </div>
                    <div class="filter-group">
                        <label for="schedule-start-date">Fecha de Comienzo</label>
                        <input type="date" id="schedule-start-date">
                    </div>
                    <button id="btn-schedule-load" class="btn">Load</button>
                    <button id="btn-schedule-reset" class="btn" style="background-color: #718096;">Reset to Template</button>
                    <span id="schedule-save-status" class="save-status"></span>
                </div>
                <div id="schedule-case-info" class="schedule-case-info hidden"></div>
                <div class="table-wrapper">
                    <table id="schedule-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Frente</th>
                                <th>Tarea</th>
                                <th>Día Inicio</th>
                                <th>Día Fin</th>
                                <th>Duración (días)</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="schedule-table-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div id="map-section">
                <div id="map"></div>
                <div id="summary-report" class="hidden">
                    <h3>Regional Summary</h3>
                    <div class="summary-content">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
            <div id="filter-section">
                <div class="filter-group">
                    <label for="search-case">Search by Case Number</label>
                    <input type="text" id="search-case" placeholder="Ex. PR-SFM-01985">
                </div>
                <div class="filter-group">
                    <label for="filter-status">Stage Status</label>
                    <select id="filter-status" multiple></select>
                </div>
                <div class="filter-group">
                    <label for="filter-municipality">Municipality</label>
                    <select id="filter-municipality" multiple></select>
                </div>
                <div class="filter-group">
                    <label for="filter-subcontractor">Subcontractor Name</label>
                    <select id="filter-subcontractor" multiple></select>
                </div>
                <div class="filter-group">
                    <label for="filter-type">Award Type Equivalent</label>
                    <select id="filter-type" multiple></select>
                </div>
                <div class="filter-group">
                    <label for="filter-region">Region</label>
                    <select id="filter-region" multiple></select>
                </div>
            </div>
            <div id="table-section">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="margin-bottom: 0;">Cases Report</h2>
                    <button id="btn-export-excel" class="btn" style="background-color: #38a169;">Export to Excel</button>
                </div>
                <div class="table-wrapper">
                    <table id="cases-table">
                        <thead>
                            <tr>
                                <th>Case ID</th>
                                <th>Municipality</th>
                                <th>Region</th>
                                <th>Award Type Equivalent</th>
                                <th>Subcontractor Name</th>
                                <th>Stage Status</th>
                                <th>Model Home Design</th>
                            </tr>
                        </thead>
                        <tbody id="cases-table-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
        <div id="loading-overlay" class="active">
            <div class="spinner"></div>
            <p>Loading Map Data...</p>
        </div>
    </div>

    <!-- Choices.js Script -->
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    
    <!-- Google Maps JS API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC7mft-eK0A5xk6JpV7w-7EGLEoINuLaqM&callback=initMap&libraries=maps,marker&v=beta" async defer></script>
    <script src="app.js?v=11"></script>
    <script src="schedule.js?v=1"></script>
</body>
</html>
